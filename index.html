<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vired Pulse</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Slab:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Roboto', sans-serif; background:#f4f4f4; }

.hero {
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('header.png') center/cover no-repeat;
  height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.container { padding:15px; max-width:900px; margin:auto; }

.tabs { display:flex; gap:10px; margin-bottom:15px; }
.tab { padding:10px 15px; background:#ddd; border-radius:6px; cursor:pointer; }
.tab.active { background:#ED1C24; color:white; }

.card {
  background:white;
  padding:16px;
  margin-bottom:14px;
  border-radius:12px;
}

.hidden { display:none; }
button { background:#ED1C24; color:white; padding:10px; border:none; border-radius:6px; cursor:pointer; }
input, select { width:100%; padding:10px; margin-bottom:8px; }
</style>

</head>

<body>

<div class="hero">
  <h1>Vired Pulse</h1>
</div>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
  <input type="email" id="email" placeholder="Enter Hero Vired email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login / Sign Up</button>
</div>

<!-- APP -->
<div id="appContent" style="display:none;">

  <!-- NAV -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('learn')">Learn</div>
    <div class="tab" onclick="showTab('call')">Call Mode</div>
    <div class="tab" onclick="showTab('ops')">Ops</div>
    <div class="tab" id="analyticsTab" style="display:none;" onclick="showTab('analytics')">Analytics</div>
  </div>

  <!-- LEARN -->
  <div id="learnTab">
    <div class="card">Learning Content (to be populated)</div>
  </div>

  <!-- CALL -->
  <div id="callTab" class="hidden">
    <div class="card">
      <button onclick="startCall()">Start Call</button>
    </div>

    <div id="callFlow" class="hidden">
      <div class="card"><p id="opening"></p></div>
      <div class="card"><ul id="probing"></ul></div>
      <div class="card"><p id="pitch"></p></div>
      <div class="card">
        <button onclick="handleObjection('price')">Price</button>
        <button onclick="handleObjection('time')">Time</button>
        <button onclick="handleObjection('trust')">Trust</button>
        <p id="objection"></p>
      </div>
      <div class="card"><p id="closing"></p></div>
    </div>
  </div>

  <!-- OPS -->
  <div id="opsTab" class="hidden">
    <div class="card">Operational Links</div>
  </div>

  <!-- ANALYTICS -->
  <div id="analyticsTabContent" class="hidden">
    <div class="card">
      <button onclick="loadDashboard()">Load Insights</button>
      <canvas id="personaChart"></canvas>
      <canvas id="objectionChart"></canvas>
      <canvas id="programChart"></canvas>
      <div id="summary"></div>
    </div>
  </div>

</div>

</div>

<!-- LIBRARIES -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- MODULES -->
<script src="data/flow.js"></script>
<script src="js/auth.js"></script>
<script src="js/navigation.js"></script>
<script src="js/call.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
