<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vired Pulse</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Slab:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Roboto', sans-serif;
  background:#f4f4f4;
}

/* HERO HEADER */
.hero {
  background: url('header.png') center/cover no-repeat;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
  position: relative;
}

.hero::after {
  content:'';
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.5);
}

.hero-content {
  position: relative;
  z-index: 1;
}

.hero h1 {
  font-family: 'Roboto Slab';
  margin:0;
  font-size: 28px;
}

.hero p {
  margin-top:5px;
  font-size:14px;
  opacity:0.9;
}

/* MAIN */
.container {
  padding:15px;
  max-width: 900px;
  margin:auto;
}

/* CARD */
.card {
  background:white;
  padding:16px;
  margin-bottom:14px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* CONTROLS */
button {
  background:#ED1C24;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  margin:5px 5px 5px 0;
  font-weight:500;
}

button:hover {
  opacity:0.9;
}

select {
  padding:10px;
  border-radius:6px;
  border:1px solid #ddd;
  margin-right:10px;
}

/* TEXT */
.section-title {
  font-weight:600;
  margin-bottom:10px;
  font-size:16px;
}

.resource {
  background:#fafafa;
  padding:10px;
  border-radius:6px;
  margin-top:8px;
}

.hidden {
  display:none;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Vired Pulse</h1>
    <p>Powered by Vired IQ • Your AI-like Call Assistant</p>
  </div>
</div>

<div class="container">

<!-- CONTEXT -->
<div class="card">
  <div class="section-title">Set Call Context</div>

  <select id="program">
    <option value="DevOps">DevOps</option>
    <option value="SIL">SIL</option>
    <option value="LxAI">LxAI</option>
  </select>

  <select id="persona">
    <option value="Support Engineer">Support Engineer</option>
    <option value="Working Professional">Working Professional</option>
    <option value="Career Switcher">Career Switcher</option>
    <option value="Manager">Manager</option>
  </select>

  <br><br>
  <button onclick="startCall()">🚀 Start Call Mode</button>
</div>

<!-- CALL FLOW -->
<div id="callFlow" class="hidden">

  <div class="card">
    <div class="section-title">🎯 Opening</div>
    <p id="opening"></p>
  </div>

  <div class="card">
    <div class="section-title">🔍 Probing</div>
    <ul id="probing"></ul>
  </div>

  <div class="card">
    <div class="section-title">💡 Pitch</div>
    <p id="pitch"></p>
  </div>

  <div class="card">
    <div class="section-title">📊 Proof</div>
    <div id="proof"></div>
  </div>

  <div class="card">
    <div class="section-title">⚔️ Objections</div>
    <button onclick="handleObjection('price')">Price</button>
    <button onclick="handleObjection('time')">Time</button>
    <button onclick="handleObjection('trust')">Trust</button>
    <p id="objection"></p>
  </div>

  <div class="card">
    <div class="section-title">💰 Closing</div>
    <p id="closing"></p>
    <button>Apply Now</button>
    <button>Batch Calendar</button>
  </div>

</div>

</div>

<script>

const data = {
  DevOps: {
    "Support Engineer": {
      opening: "What made you explore moving beyond support roles right now?",
      probing: [
        "What kind of tickets do you handle?",
        "Exposure to automation?",
        "Growth expectations?",
        "Why now?"
      ],
      pitch: "You're close to DevOps already, but stuck in reactive work. This moves you into automation, CI/CD, and ownership roles.",
      proof: ["₹4L → ₹9L transition", "Hands-on CI/CD pipelines"],
      objections: {
        price: "Recovered via salary jump within a year.",
        time: "10–12 hrs/week.",
        trust: "Attend a live class + alumni connect."
      },
      closing: "Let’s secure your seat—you can evaluate in the session."
    }
  }
};

function startCall() {
  const program = document.getElementById("program").value;
  const persona = document.getElementById("persona").value;

  const flow = data[program][persona] || data[program]["Support Engineer"];

  document.getElementById("callFlow").classList.remove("hidden");

  document.getElementById("opening").innerText = flow.opening;

  const probingList = document.getElementById("probing");
  probingList.innerHTML = "";
  flow.probing.forEach(q => {
    const li = document.createElement("li");
    li.innerText = q;
    probingList.appendChild(li);
  });

  document.getElementById("pitch").innerText = flow.pitch;

  const proofDiv = document.getElementById("proof");
  proofDiv.innerHTML = "";
  flow.proof.forEach(p => {
    const div = document.createElement("div");
    div.className = "resource";
    div.innerText = p;
    proofDiv.appendChild(div);
  });

  window.currentObjections = flow.objections;
  document.getElementById("closing").innerText = flow.closing;
}

function handleObjection(type) {
  document.getElementById("objection").innerText = window.currentObjections[type];
}

</script>

</body>
</html>
