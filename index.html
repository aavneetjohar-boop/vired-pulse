<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- CHARTS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCloEk4A8Yq5TwGZQNsrB7Y0Hc-DCUUFPs",
  authDomain: "vired-pulse.firebaseapp.com",
  projectId: "vired-pulse",
  storageBucket: "vired-pulse.firebasestorage.app",
  messagingSenderId: "139422394890",
  appId: "1:139422394890:web:5a41ec6bd2f3da51e88df3"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// 🔐 LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(user => {
      window.currentUser = user.user.email;
      document.getElementById("loginBox").style.display = "none";
    })
    .catch(err => alert(err.message));
}

// 📦 DATA (EXPAND THIS LATER)
const data = {
  DevOps: {
    "Support Engineer": {
      opening: "What made you explore moving beyond support roles right now?",
      probing: ["Current role?", "Growth goals?", "Biggest blocker?", "Why now?"],
      pitch: "You're close to DevOps but stuck in reactive work. This helps you move into automation & ownership roles.",
      proof: ["₹4L → ₹9L growth", "Hands-on CI/CD"],
      objections: {
        price: "Recovered via salary jump within a year.",
        time: "10–12 hrs/week.",
        trust: "Attend live class + alumni connect."
      },
      closing: "Let’s secure your seat—you can evaluate in session."
    }
  }
};

// 🚀 START CALL
function startCall() {
  const program = document.getElementById("program").value;
  const persona = document.getElementById("persona").value;

  const flow = data[program][persona];

  document.getElementById("callFlow").classList.remove("hidden");

  document.getElementById("opening").innerText = flow.opening;

  const probingList = document.getElementById("probing");
  probingList.innerHTML = "";
  flow.probing.forEach(q => {
    const li = document.createElement("li");
    li.innerText = q;
    probingList.appendChild(li);
  });

  document.getElementById("pitch").innerText = flow.pitch;

  const proofDiv = document.getElementById("proof");
  proofDiv.innerHTML = "";
  flow.proof.forEach(p => {
    const div = document.createElement("div");
    div.className = "resource";
    div.innerText = p;
    proofDiv.appendChild(div);
  });

  window.currentObjections = flow.objections;
  document.getElementById("closing").innerText = flow.closing;

  // 🔥 TRACK CALL
  db.collection("events").add({
    type: "start_call",
    user: window.currentUser || "anonymous",
    program,
    persona,
    timestamp: new Date()
  });
}

// ⚔️ HANDLE OBJECTION
function handleObjection(type) {
  document.getElementById("objection").innerText = window.currentObjections[type];

  db.collection("events").add({
    type: "objection_click",
    user: window.currentUser || "anonymous",
    objection: type,
    timestamp: new Date()
  });
}

// 📊 DASHBOARD
async function loadDashboard() {

  const snapshot = await db.collection("events").get();

  let personaCount = {};
  let programCount = {};
  let objectionCount = {};
  let userCount = {};
  let totalCalls = 0;

  snapshot.forEach(doc => {
    const d = doc.data();

    if (d.type === "start_call") {
      totalCalls++;
      personaCount[d.persona] = (personaCount[d.persona] || 0) + 1;
      programCount[d.program] = (programCount[d.program] || 0) + 1;
      userCount[d.user] = (userCount[d.user] || 0) + 1;
    }

    if (d.type === "objection_click") {
      objectionCount[d.objection] = (objectionCount[d.objection] || 0) + 1;
    }
  });

  // DESTROY OLD CHARTS
  if (window.personaChartObj) window.personaChartObj.destroy();
  if (window.objectionChartObj) window.objectionChartObj.destroy();
  if (window.programChartObj) window.programChartObj.destroy();

  // PERSONA CHART
  window.personaChartObj = new Chart(document.getElementById("personaChart"), {
    type: 'bar',
    data: {
      labels: Object.keys(personaCount),
      datasets: [{ label: 'Persona Usage', data: Object.values(personaCount) }]
    }
  });

  // OBJECTION CHART
  window.objectionChartObj = new Chart(document.getElementById("objectionChart"), {
    type: 'pie',
    data: {
      labels: Object.keys(objectionCount),
      datasets: [{ data: Object.values(objectionCount) }]
    }
  });

  // PROGRAM CHART
  window.programChartObj = new Chart(document.getElementById("programChart"), {
    type: 'bar',
    data: {
      labels: Object.keys(programCount),
      datasets: [{ label: 'Program Usage', data: Object.values(programCount) }]
    }
  });

  // SUMMARY
  function top(obj) {
    return Object.entries(obj).sort((a,b)=>b[1]-a[1])[0];
  }

  document.getElementById("summary").innerHTML = `
    <div class="resource">📞 Total Calls: ${totalCalls}</div>
    <div class="resource">👤 Top Persona: ${top(personaCount)?.[0] || '-'}</div>
    <div class="resource">🔥 Top Objection: ${top(objectionCount)?.[0] || '-'}</div>
    <div class="resource">🏆 Top LC: ${top(userCount)?.[0] || '-'}</div>
  `;
}

</script>
